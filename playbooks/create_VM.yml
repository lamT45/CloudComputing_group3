- name: Create Azure VM (robust playbook - waits for VNet)
  hosts: localhost
  connection: local
  gather_facts: no
  collections:
    - azure.azcollection

  vars:
    rg_name: myResourceGroup
    location: francecentral
    vnet_name: myVnet
    vnet_prefixes:
      - "10.0.0.0/16"
    subnet_name: mySubnet
    subnet_prefix: "10.0.1.0/24"
    public_ip_name: myPublicIP
    public_ip_sku: Standard
    public_ip_allocation: Static
    nsg_name: myNetworkSecurityGroup
    nic_name: myNIC
    vm_name: myVM
    vm_size: Standard_B2ats_v2
    admin_username: azureuser
    ssh_public_key_path: "~/.ssh/id_rsa.pub"
    image:
      publisher: Canonical
      offer: UbuntuServer
      sku: 22_04-lts
      version: latest

  tasks:
    - name: Read SSH public key from control host
      slurp:
        src: "{{ ssh_public_key_path | expanduser }}"
      register: ssh_pubkey
      changed_when: false

    - name: Ensure resource group exists
      azure_rm_resourcegroup:
        name: "{{ rg_name }}"
        location: "{{ location }}"

    - name: Create virtual network
      azure_rm_virtualnetwork:
        resource_group: "{{ rg_name }}"
        name: "{{ vnet_name }}"
        address_prefixes: "{{ vnet_prefixes }}"
      register: vnet_result

    - name: Wait for virtual network to be visible (info)
      azure_rm_virtualnetwork_info:
        resource_group: "{{ rg_name }}"
        name: "{{ vnet_name }}"
      register: vnet_info
      retries: 6
      delay: 5
      until: vnet_info.virtual_networks | length > 0

    - name: Debug VNet info (optional)
      debug:
        var: vnet_info

    - name: Create subnet (will fail if VNet missing)
      azure_rm_subnet:
        resource_group: "{{ rg_name }}"
        name: "{{ subnet_name }}"
        address_prefix: "{{ subnet_prefix }}"
        virtual_network: "{{ vnet_name }}"
      register: subnet_result

    - name: Create public IP address (SKU Standard required for Azure Students)
      azure_rm_publicipaddress:
        resource_group: "{{ rg_name }}"
        name: "{{ public_ip_name }}"
        allocation_method: "{{ public_ip_allocation }}"
        sku: "{{ public_ip_sku }}"
      register: public_ip_result

    - name: Create Network Security Group (allow SSH)
      azure_rm_networksecuritygroup:
        resource_group: "{{ rg_name }}"
        name: "{{ nsg_name }}"
        security_rules:
          - name: Allow-SSH
            priority: 1001
            protocol: Tcp
            access: Allow
            direction: Inbound
            source_address_prefix: '*'
            destination_address_prefix: '*'
            source_port_range: '*'
            destination_port_range: '22'

    - name: Create network interface and attach public IP & NSG
      azure_rm_networkinterface:
        resource_group: "{{ rg_name }}"
        name: "{{ nic_name }}"
        virtual_network: "{{ vnet_name }}"
        subnet: "{{ subnet_name }}"
        public_ip_name: "{{ public_ip_name }}"
        network_security_group: "{{ nsg_name }}"
      register: nic_result

    - name: Create virtual machine
      azure_rm_virtualmachine:
        resource_group: "{{ rg_name }}"
        name: "{{ vm_name }}"
        vm_size: "{{ vm_size }}"
        admin_username: "{{ admin_username }}"
        ssh_password_enabled: false
        ssh_public_keys:
          - path: "/home/{{ admin_username }}/.ssh/authorized_keys"
            key_data: "{{ (ssh_pubkey.content | b64decode).strip() }}"
        network_interfaces: "{{ nic_result.id }}"
        image:
          publisher: "{{ image.publisher }}"
          offer: "{{ image.offer }}"
          sku: "{{ image.sku }}"
          version: "{{ image.version }}"
      register: vm_result

    - name: Wait for public IP to be populated
      azure_rm_publicipaddress_info:
        resource_group: "{{ rg_name }}"
        name: "{{ public_ip_name }}"
      register: pip_info
      retries: 12
      delay: 5
      until: pip_info.azure_public_ipaddresses | length > 0 and pip_info.azure_public_ipaddresses[0].ip_address is defined

    - name: Show summary
      debug:
        msg:
          - "VM: {{ vm_name }}"
          - "VM provisioning state: {{ vm_result.provisioning_state | default('unknown') }}"
          - "Public IP: {{ pip_info.azure_public_ipaddresses[0].ip_address }}"
          - "NIC id: {{ nic_result.id }}"
